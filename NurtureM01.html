<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e3e5e8;
      --border-strong: #c8cbd0;
      --text-primary: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #378ADD;
      --accent-light: #E6F1FB;
      --accent-dark: #185FA5;
      --today-bg: #378ADD;
      --today-text: #ffffff;
      --chip-normal-bg: #dbeafe;
      --chip-normal-name: #1e3a5f;
      --chip-normal-meta: #3b6fa8;
      --chip-overdue-bg: #fee2e2;
      --chip-overdue-name: #7f1d1d;
      --chip-overdue-meta: #b91c1c;
      --chip-soon-bg: #fef3c7;
      --chip-soon-name: #78350f;
      --chip-soon-meta: #b45309;
      --drop-highlight: #e0f0ff;
      --drop-border: #378ADD;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111214;
        --surface: #1c1e22;
        --border: #2c2f35;
        --border-strong: #3d4147;
        --text-primary: #f0f1f3;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --accent: #5AA5F0;
        --accent-light: #0c2a45;
        --accent-dark: #85C4FF;
        --today-bg: #5AA5F0;
        --today-text: #04203d;
        --chip-normal-bg: #1e4976;
        --chip-normal-name: #bfdbfe;
        --chip-normal-meta: #7ab3e0;
        --chip-overdue-bg: #6b1f1f;
        --chip-overdue-name: #fca5a5;
        --chip-overdue-meta: #f87171;
        --chip-soon-bg: #6b4b10;
        --chip-soon-name: #fde68a;
        --chip-soon-meta: #fbbf24;
        --drop-highlight: #0c2a45;
        --drop-border: #5AA5F0;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 20px 40px;
      user-select: none;
    }

    .app { max-width: 1100px; margin: 0 auto; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .app-icon {
      width: 36px; height: 36px; background: var(--accent);
      border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cal-title { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .cal-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
    .nav-btns { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      background: var(--surface); border: 0.5px solid var(--border-strong);
      color: var(--text-primary); border-radius: 8px; padding: 7px 14px;
      cursor: pointer; font-size: 13px; font-weight: 500;
      transition: background 0.15s, border-color 0.15s; line-height: 1;
    }
    .nav-btn:hover { background: var(--bg); border-color: var(--accent); }
    .nav-btn.today { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); }
    .nav-btn.today:hover { opacity: 0.85; }

    .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .stat-chip {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 20px; padding: 5px 12px; font-size: 12px;
      color: var(--text-secondary); display: flex; align-items: center; gap: 6px;
    }
    .stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .stat-chip .dot.overdue  { background: #E24B4A; }
    .stat-chip .dot.due-soon { background: #EF9F27; }

    .calendar {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .weekdays {
      display: grid; grid-template-columns: repeat(7, minmax(0, 1fr));
      background: var(--bg); border-bottom: 0.5px solid var(--border);
    }
    .weekday {
      text-align: center; font-size: 11px; font-weight: 500;
      letter-spacing: 0.06em; color: var(--text-muted); padding: 10px 0;
    }
    .days-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); }

    .day-cell {
      border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border);
      min-height: 118px; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
      transition: background 0.12s, box-shadow 0.12s;
      position: relative;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    /* Remove bottom border from the last row of cells */
    .day-cell.last-row { border-bottom: none; }
    .day-cell.empty {
      background: var(--bg); opacity: 0.5;
    }
    .day-cell.empty.drag-over, .day-cell.overflow.drag-over {
      opacity: 1;
    }
    .day-cell.overflow {
      background: var(--bg); opacity: 0.5;
    }
    .day-cell.drag-over {
      background: var(--drop-highlight);
      box-shadow: inset 0 0 0 2px var(--drop-border);
    }

    .day-num {
      font-size: 13px; font-weight: 500; color: var(--text-secondary);
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0; margin-bottom: 2px; pointer-events: none;
    }
    .day-cell.is-today .day-num { background: var(--today-bg); color: var(--today-text); }
    .day-cell.is-weekend .day-num { color: var(--text-muted); }
    .day-cell.overflow .day-num { color: var(--text-muted); }

    a.card-chip {
      display: block; background: var(--chip-normal-bg); border-radius: 6px;
      padding: 5px 8px; overflow: hidden; text-decoration: none;
      transition: filter 0.12s, opacity 0.12s;
      cursor: grab; position: relative;
    }
    a.card-chip:hover { filter: brightness(0.90); }
    a.card-chip.overdue  { background: var(--chip-overdue-bg); }
    a.card-chip.due-soon { background: var(--chip-soon-bg); }
    a.card-chip.dragging { opacity: 0.35; cursor: grabbing; }

    .card-name {
      font-size: 11px; font-weight: 500; color: var(--chip-normal-name);
      line-height: 1.35; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; padding-right: 14px;
    }
    a.card-chip.overdue  .card-name { color: var(--chip-overdue-name); }
    a.card-chip.due-soon .card-name { color: var(--chip-soon-name); }

    .card-meta { font-size: 10px; color: var(--chip-normal-meta); margin-top: 2px; }
    a.card-chip.overdue  .card-meta { color: var(--chip-overdue-meta); }
    a.card-chip.due-soon .card-meta { color: var(--chip-soon-meta); }

    .card-grip {
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
      display: grid; grid-template-columns: 1fr 1fr; gap: 2px;
      opacity: 0; transition: opacity 0.12s; pointer-events: none;
    }
    a.card-chip:hover .card-grip { opacity: 0.35; }
    .card-grip i {
      display: block; width: 3px; height: 3px; border-radius: 50%;
      background: currentColor;
    }

    .more-badge { font-size: 10px; color: var(--text-muted); padding: 2px 4px; }

    #drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: var(--chip-normal-bg); border-radius: 6px;
      padding: 6px 10px; font-size: 11px; font-weight: 500;
      color: var(--chip-normal-name); max-width: 160px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      box-shadow: 0 6px 20px rgba(0,0,0,0.22); transform: rotate(2deg) scale(1.05);
      display: none; border: 0.5px solid rgba(0,0,0,0.08);
    }
    #drag-ghost.overdue  { background: var(--chip-overdue-bg); color: var(--chip-overdue-name); }
    #drag-ghost.due-soon { background: var(--chip-soon-bg);    color: var(--chip-soon-name); }

    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--text-primary); color: var(--bg);
      font-size: 13px; padding: 9px 18px; border-radius: 20px;
      opacity: 0; transition: opacity 0.2s, transform 0.2s;
      pointer-events: none; white-space: nowrap; z-index: 10000;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { background: #b91c1c; color: #fff; }

    .status-bar { font-size: 13px; color: var(--text-secondary); text-align: center; padding: 12px 0 0; }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--border-strong); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      background: var(--chip-overdue-bg); border: 0.5px solid var(--chip-overdue-meta);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: var(--chip-overdue-name); margin-top: 12px;
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="app-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="11" y="2" width="7" height="5" rx="2" fill="white" opacity="0.9"/>
          <rect x="11" y="9" width="7" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="2" y="13" width="7" height="5" rx="2" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div>
        <div class="cal-title" id="calTitle">Loading...</div>
        <div class="cal-subtitle">Trello Board Calendar</div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn">&#8592; Prev</button>
      <button class="nav-btn today" id="todayBtn">Today</button>
      <button class="nav-btn" id="nextBtn">Next &#8594;</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">SUN</div><div class="weekday">MON</div>
      <div class="weekday">TUE</div><div class="weekday">WED</div>
      <div class="weekday">THU</div><div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="spinner"></span> Fetching cards from Trello...
  </div>
</div>

<div id="drag-ghost"></div>
<div id="toast"></div>

<script>
  const API_KEY   = '1db0731540ea0751b2b9b933b519741b';
  const API_TOKEN = 'ATTAa3178efc9e6833476c908ab148a8fab453c317fdd7feff34fd7cef29c2f2bd4bA7BD63BC';
  const BOARD_ID  = '695d1098091037e9ed332c23';
  const MAX_VISIBLE = 3;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let nav = 0, allCards = [], loaded = false;

  let dragCardId   = null;
  let lastDropCell = null;
  let touchDragActive = false;

  const ghost    = document.getElementById('drag-ghost');
  const toastEl  = document.getElementById('toast');
  let toastTimer;

  function computeStatus(date) {
    const diff = Math.ceil((date - new Date()) / 86400000);
    if (diff < 0)  return 'overdue';
    if (diff <= 2) return 'due-soon';
    return 'normal';
  }

  function showToast(msg, isError = false) {
    toastEl.textContent = msg;
    toastEl.className   = 'show' + (isError ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.className = ''; }, 3200);
  }

  function showGhost(x, y, card) {
    ghost.textContent   = card.name;
    ghost.className     = card.status !== 'normal' ? card.status : '';
    ghost.style.left    = (x + 14) + 'px';
    ghost.style.top     = (y - 12) + 'px';
    ghost.style.display = 'block';
  }

  function hideGhost() { ghost.style.display = 'none'; }

  function clearDropCell() {
    if (lastDropCell) { lastDropCell.classList.remove('drag-over'); lastDropCell = null; }
  }

  function highlightCell(cell) {
    if (lastDropCell === cell) return;
    clearDropCell();
    if (cell) { cell.classList.add('drag-over'); lastDropCell = cell; }
  }

  async function fetchCards() {
    try {
      const res  = await fetch(`https://api.trello.com/1/boards/${BOARD_ID}/cards?key=${API_KEY}&token=${API_TOKEN}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allCards = data.filter(c => c.due).map(c => {
        const d = new Date(c.due);
        return { id: c.id, name: c.name, date: d, status: computeStatus(d), url: c.url };
      });
      loaded = true;
      document.getElementById('statusBar').style.display = 'none';
      renderStats(); render();
    } catch(e) {
      document.getElementById('statusBar').innerHTML =
        `<div class="error-msg">Could not load Trello cards.<br><small>${e.message}</small></div>`;
    }
  }

  async function updateDueDate(cardId, newDate) {
    const res = await fetch(
      `https://api.trello.com/1/cards/${cardId}?key=${API_KEY}&token=${API_TOKEN}`,
      { method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ due: newDate.toISOString() }) }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
  }

  function renderStats() {
    const overdue = allCards.filter(c => c.status === 'overdue').length;
    const dueSoon = allCards.filter(c => c.status === 'due-soon').length;
    const total   = allCards.length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-chip"><span class="dot"></span>${total} card${total !== 1?'s':''} with due dates</div>
      ${dueSoon ? `<div class="stat-chip"><span class="dot due-soon"></span>${dueSoon} due within 2 days</div>` : ''}
      ${overdue  ? `<div class="stat-chip"><span class="dot overdue"></span>${overdue} overdue</div>` : ''}
      <div class="stat-chip" style="margin-left:auto;font-style:italic;opacity:0.6;">Drag cards to reschedule</div>
    `;
  }

  function render() {
    const now   = new Date();
    const base  = new Date(now.getFullYear(), now.getMonth() + nav, 1);
    const month = base.getMonth(), year = base.getFullYear();

    document.getElementById('calTitle').textContent = `${MONTHS[month]} ${year}`;

    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    // Total cells used so far = firstDay (leading empties) + daysInMonth
    const totalCells = firstDay + daysInMonth;
    // Round up to next multiple of 7 to find how many trailing overflow days we need
    const rows = Math.ceil(totalCells / 7);
    const totalSlots = rows * 7;
    const trailingCount = totalSlots - totalCells;

    // Leading empty cells (days from previous month shown as dimmed)
    const prevMonthDays = new Date(year, month, 0).getDate(); // last day of previous month
    const prevMonth = month === 0 ? 11 : month - 1;
    const prevYear  = month === 0 ? year - 1 : year;
    for (let i = 0; i < firstDay; i++) {
      const dayNum = prevMonthDays - firstDay + i + 1;
      const el = document.createElement('div');
      el.className = 'day-cell empty';
      el.dataset.day   = dayNum;
      el.dataset.month = prevMonth;
      el.dataset.year  = prevYear;

      el.addEventListener('dragover',  onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop',      onDrop);

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = dayNum;
      el.appendChild(numEl);

      if (loaded) {
        const dayCards = allCards.filter(c =>
          c.date.getDate() === dayNum && c.date.getMonth() === prevMonth && c.date.getFullYear() === prevYear
        );
        dayCards.slice(0, MAX_VISIBLE).forEach(card => el.appendChild(buildChip(card)));
        const hidden = dayCards.length - MAX_VISIBLE;
        if (hidden > 0) {
          const more = document.createElement('div');
          more.className = 'more-badge'; more.textContent = `+${hidden} more`;
          el.appendChild(more);
        }
      }

      grid.appendChild(el);
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.dataset.day = d; cell.dataset.month = month; cell.dataset.year = year;

      const dow = new Date(year, month, d).getDay();
      if (d === now.getDate() && month === now.getMonth() && year === now.getFullYear())
        cell.classList.add('is-today');
      if (dow === 0 || dow === 6) cell.classList.add('is-weekend');

      // Mark last row cells so we can remove their bottom border
      const cellIndex = firstDay + d - 1; // 0-based position
      if (cellIndex >= (rows - 1) * 7) cell.classList.add('last-row');

      cell.addEventListener('dragover',  onDragOver);
      cell.addEventListener('dragleave', onDragLeave);
      cell.addEventListener('drop',      onDrop);

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (loaded) {
        const dayCards = allCards.filter(c =>
          c.date.getDate() === d && c.date.getMonth() === month && c.date.getFullYear() === year
        );
        dayCards.slice(0, MAX_VISIBLE).forEach(card => cell.appendChild(buildChip(card)));
        const hidden = dayCards.length - MAX_VISIBLE;
        if (hidden > 0) {
          const more = document.createElement('div');
          more.className = 'more-badge'; more.textContent = `+${hidden} more`;
          cell.appendChild(more);
        }
      }
      grid.appendChild(cell);
    }

    // Trailing overflow cells — next month's days, droppable
    const nextMonth = (month + 1) % 12;
    const nextYear  = month === 11 ? year + 1 : year;
    for (let d = 1; d <= trailingCount; d++) {
      const el = document.createElement('div');
      el.className = 'day-cell overflow last-row';
      el.dataset.day   = d;
      el.dataset.month = nextMonth;
      el.dataset.year  = nextYear;

      el.addEventListener('dragover',  onDragOver);
      el.addEventListener('dragleave', onDragLeave);
      el.addEventListener('drop',      onDrop);

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      el.appendChild(numEl);

      if (loaded) {
        const dayCards = allCards.filter(c =>
          c.date.getDate() === d && c.date.getMonth() === nextMonth && c.date.getFullYear() === nextYear
        );
        dayCards.slice(0, MAX_VISIBLE).forEach(card => el.appendChild(buildChip(card)));
        const hidden = dayCards.length - MAX_VISIBLE;
        if (hidden > 0) {
          const more = document.createElement('div');
          more.className = 'more-badge'; more.textContent = `+${hidden} more`;
          el.appendChild(more);
        }
      }

      grid.appendChild(el);
    }
  }

  function buildChip(card) {
    const chip = document.createElement('a');
    chip.className  = 'card-chip' + (card.status !== 'normal' ? ' ' + card.status : '');
    chip.href       = card.url;
    chip.target     = '_blank';
    chip.rel        = 'noopener noreferrer';
    chip.title      = card.name;
    chip.draggable  = true;
    chip.dataset.cardId = card.id;

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name'; nameEl.textContent = card.name;

    const metaEl = document.createElement('div');
    metaEl.className = 'card-meta'; metaEl.textContent = DAYS[card.date.getDay()];

    const grip = document.createElement('div');
    grip.className = 'card-grip';
    for (let i = 0; i < 6; i++) grip.appendChild(document.createElement('i'));

    chip.appendChild(nameEl); chip.appendChild(metaEl); chip.appendChild(grip);

    chip.addEventListener('dragstart', (e) => {
      dragCardId = card.id;
      chip.classList.add('dragging');
      showGhost(e.clientX, e.clientY, card);
      const px = document.createElement('canvas'); px.width = px.height = 1;
      e.dataTransfer.setDragImage(px, 0, 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    chip.addEventListener('drag', (e) => {
      if (e.clientX || e.clientY) showGhost(e.clientX, e.clientY, card);
    });

    chip.addEventListener('dragend', () => {
      chip.classList.remove('dragging');
      hideGhost(); clearDropCell(); dragCardId = null;
    });

    let touchMoved = false;

    chip.addEventListener('touchstart', (e) => {
      touchMoved = false;
      chip._touchTimer = setTimeout(() => {
        touchDragActive = true;
        dragCardId = card.id;
        chip.classList.add('dragging');
        const t = e.touches[0];
        showGhost(t.clientX, t.clientY, card);
      }, 200);
    }, { passive: true });

    chip.addEventListener('touchmove', (e) => {
      touchMoved = true;
      if (!touchDragActive) return;
      e.preventDefault();
      const t = e.touches[0];
      showGhost(t.clientX, t.clientY, card);
      const el   = document.elementFromPoint(t.clientX, t.clientY);
      const cell = el ? el.closest('.day-cell') : null;
      highlightCell(cell);
    }, { passive: false });

    chip.addEventListener('touchend', (e) => {
      clearTimeout(chip._touchTimer);
      if (!touchDragActive) return;

      e.preventDefault();
      chip.classList.remove('dragging');
      hideGhost();
      const t    = e.changedTouches[0];
      const el   = document.elementFromPoint(t.clientX, t.clientY);
      const cell = el ? el.closest('.day-cell') : null;
      clearDropCell();
      if (cell) dropOnCell(cell);
      touchDragActive = false; dragCardId = null;
    });

    chip.addEventListener('touchcancel', () => {
      clearTimeout(chip._touchTimer);
      chip.classList.remove('dragging');
      hideGhost(); clearDropCell();
      touchDragActive = false; dragCardId = null;
    });

    return chip;
  }

  function onDragOver(e) {
    if (!dragCardId) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    highlightCell(e.currentTarget);
  }

  function onDragLeave(e) {
    const cell = e.currentTarget;
    if (!cell.contains(e.relatedTarget)) cell.classList.remove('drag-over');
  }

  function onDrop(e) {
    e.preventDefault();
    const cell = e.currentTarget;
    cell.classList.remove('drag-over');
    lastDropCell = null;
    dropOnCell(cell);
  }

  async function dropOnCell(cell) {
    if (!dragCardId) return;
    const card = allCards.find(c => c.id === dragCardId);
    if (!card) return;

    const newDay   = parseInt(cell.dataset.day,   10);
    const newMonth = parseInt(cell.dataset.month, 10);
    const newYear  = parseInt(cell.dataset.year,  10);

    const newDate = new Date(newYear, newMonth, newDay,
      card.date.getHours(), card.date.getMinutes(), card.date.getSeconds());

    if (newDate.toDateString() === card.date.toDateString()) return;

    const prevDate = card.date;

    card.date   = newDate;
    card.status = computeStatus(newDate);
    renderStats(); render();
    showToast(`Rescheduling "${card.name}" → ${newDate.toLocaleDateString()}…`);

    try {
      await updateDueDate(card.id, newDate);
      showToast(`✓ "${card.name}" moved to ${newDate.toLocaleDateString()}`);
    } catch(err) {
      card.date   = prevDate;
      card.status = computeStatus(prevDate);
      renderStats(); render();
      showToast(`Failed to update: ${err.message}`, true);
    }
  }

  document.getElementById('prevBtn').addEventListener('click',  () => { nav--; render(); });
  document.getElementById('nextBtn').addEventListener('click',  () => { nav++; render(); });
  document.getElementById('todayBtn').addEventListener('click', () => { nav = 0; render(); });

  render();
  fetchCards();
</script>
</body>
</html>
