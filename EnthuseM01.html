<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trello Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f7f9;
      --surface: #ffffff;
      --border: #e3e5e8;
      --border-strong: #c8cbd0;
      --text-primary: #1a1d23;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #378ADD;
      --accent-light: #E6F1FB;
      --accent-dark: #185FA5;
      --today-bg: #378ADD;
      --today-text: #ffffff;

      --chip-normal-bg: #dbeafe;
      --chip-normal-name: #1e3a5f;
      --chip-normal-meta: #3b6fa8;
      --chip-overdue-bg: #fee2e2;
      --chip-overdue-name: #7f1d1d;
      --chip-overdue-meta: #b91c1c;
      --chip-soon-bg: #fef3c7;
      --chip-soon-name: #78350f;
      --chip-soon-meta: #b45309;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111214;
        --surface: #1c1e22;
        --border: #2c2f35;
        --border-strong: #3d4147;
        --text-primary: #f0f1f3;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --accent: #5AA5F0;
        --accent-light: #0c2a45;
        --accent-dark: #85C4FF;
        --today-bg: #5AA5F0;
        --today-text: #04203d;

        --chip-normal-bg: #1e4976;
        --chip-normal-name: #bfdbfe;
        --chip-normal-meta: #7ab3e0;
        --chip-overdue-bg: #6b1f1f;
        --chip-overdue-name: #fca5a5;
        --chip-overdue-meta: #f87171;
        --chip-soon-bg: #6b4b10;
        --chip-soon-name: #fde68a;
        --chip-soon-meta: #fbbf24;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 24px 20px 40px;
    }

    .app { max-width: 1100px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .app-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .cal-title { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .cal-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }

    .nav-btns { display: flex; align-items: center; gap: 6px; }

    .nav-btn {
      background: var(--surface);
      border: 0.5px solid var(--border-strong);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1;
    }

    .nav-btn:hover { background: var(--bg); border-color: var(--accent); }

    .nav-btn.today {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .nav-btn.today:hover { opacity: 0.85; }

    .stats-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

    .stat-chip {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex; align-items: center; gap: 6px;
    }

    .stat-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .stat-chip .dot.overdue  { background: #E24B4A; }
    .stat-chip .dot.due-soon { background: #EF9F27; }

    .calendar {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 10px 0;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .day-cell {
      border-right: 0.5px solid var(--border);
      border-bottom: 0.5px solid var(--border);
      min-height: 118px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell.empty { background: var(--bg); opacity: 0.6; }

    .day-num {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .day-cell.is-today .day-num { background: var(--today-bg); color: var(--today-text); }
    .day-cell.is-weekend .day-num { color: var(--text-muted); }

    .card-chip {
      background: var(--chip-normal-bg);
      border-radius: 6px;
      padding: 5px 8px;
      cursor: default;
      overflow: hidden;
      transition: filter 0.15s;
    }

    .card-chip:hover { filter: brightness(0.93); }
    .card-chip.overdue  { background: var(--chip-overdue-bg); }
    .card-chip.due-soon { background: var(--chip-soon-bg); }

    .card-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--chip-normal-name);
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-chip.overdue  .card-name { color: var(--chip-overdue-name); }
    .card-chip.due-soon .card-name { color: var(--chip-soon-name); }

    .card-meta {
      font-size: 10px;
      color: var(--chip-normal-meta);
      margin-top: 2px;
    }

    .card-chip.overdue  .card-meta { color: var(--chip-overdue-meta); }
    .card-chip.due-soon .card-meta { color: var(--chip-soon-meta); }

    .more-badge { font-size: 10px; color: var(--text-muted); padding: 2px 4px; }

    .status-bar {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      padding: 12px 0 0;
    }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid var(--border-strong);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: var(--chip-overdue-bg);
      border: 0.5px solid var(--chip-overdue-meta);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--chip-overdue-name);
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="app-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="7" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="11" y="2" width="7" height="5" rx="2" fill="white" opacity="0.9"/>
          <rect x="11" y="9" width="7" height="9" rx="2" fill="white" opacity="0.9"/>
          <rect x="2" y="13" width="7" height="5" rx="2" fill="white" opacity="0.9"/>
        </svg>
      </div>
      <div>
        <div class="cal-title" id="calTitle">Loading...</div>
        <div class="cal-subtitle">Trello Board Calendar</div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" id="prevBtn">&#8592; Prev</button>
      <button class="nav-btn today" id="todayBtn">Today</button>
      <button class="nav-btn" id="nextBtn">Next &#8594;</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="calendar">
    <div class="weekdays">
      <div class="weekday">SUN</div>
      <div class="weekday">MON</div>
      <div class="weekday">TUE</div>
      <div class="weekday">WED</div>
      <div class="weekday">THU</div>
      <div class="weekday">FRI</div>
      <div class="weekday">SAT</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="spinner"></span> Fetching cards from Trello...
  </div>

</div>

<script>
  const API_KEY   = '1db0731540ea0751b2b9b933b519741b';
  const API_TOKEN = 'ATTAa3178efc9e6833476c908ab148a8fab453c317fdd7feff34fd7cef29c2f2bd4bA7BD63BC';
  const BOARD_ID  = '695c638857e213eb5b8b251b';
  const MAX_VISIBLE = 3;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let nav = 0;
  let allCards = [];
  let loaded = false;

  async function fetchCards() {
    try {
      const res = await fetch(`https://api.trello.com/1/boards/${BOARD_ID}/cards?key=${API_KEY}&token=${API_TOKEN}`);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const now = new Date();
      allCards = data.filter(c => c.due).map(c => {
        const d = new Date(c.due);
        const diff = Math.ceil((d - now) / 86400000);
        let status = 'normal';
        if (diff < 0) status = 'overdue';
        else if (diff <= 2) status = 'due-soon';
        return { id: c.id, name: c.name, date: d, status };
      });
      loaded = true;
      document.getElementById('statusBar').style.display = 'none';
      renderStats();
      render();
    } catch(e) {
      document.getElementById('statusBar').innerHTML =
        `<div class="error-msg">Could not load Trello cards. Check your API key, token, and board ID.<br><small>${e.message}</small></div>`;
    }
  }

  function renderStats() {
    const overdue = allCards.filter(c => c.status === 'overdue').length;
    const dueSoon = allCards.filter(c => c.status === 'due-soon').length;
    const total   = allCards.length;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat-chip"><span class="dot"></span>${total} card${total !== 1 ? 's' : ''} with due dates</div>
      ${dueSoon ? `<div class="stat-chip"><span class="dot due-soon"></span>${dueSoon} due within 2 days</div>` : ''}
      ${overdue ? `<div class="stat-chip"><span class="dot overdue"></span>${overdue} overdue</div>` : ''}
    `;
  }

  function render() {
    const now   = new Date();
    const base  = new Date(now.getFullYear(), now.getMonth() + nav, 1);
    const month = base.getMonth();
    const year  = base.getFullYear();

    document.getElementById('calTitle').textContent = `${MONTHS[month]} ${year}`;

    const firstDay    = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div');
      el.className = 'day-cell empty';
      grid.appendChild(el);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      const dow = new Date(year, month, d).getDay();
      if (d === now.getDate() && month === now.getMonth() && year === now.getFullYear()) cell.classList.add('is-today');
      if (dow === 0 || dow === 6) cell.classList.add('is-weekend');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      cell.appendChild(numEl);

      if (loaded) {
        const dayCards = allCards.filter(c =>
          c.date.getDate() === d && c.date.getMonth() === month && c.date.getFullYear() === year
        );
        dayCards.slice(0, MAX_VISIBLE).forEach(card => {
          const chip = document.createElement('div');
          chip.className = 'card-chip' + (card.status !== 'normal' ? ' ' + card.status : '');
          const nameEl = document.createElement('div');
          nameEl.className = 'card-name';
          nameEl.textContent = card.name;
          const metaEl = document.createElement('div');
          metaEl.className = 'card-meta';
          metaEl.textContent = DAYS[card.date.getDay()];
          chip.appendChild(nameEl);
          chip.appendChild(metaEl);
          cell.appendChild(chip);
        });
        const hidden = dayCards.length - MAX_VISIBLE;
        if (hidden > 0) {
          const more = document.createElement('div');
          more.className = 'more-badge';
          more.textContent = `+${hidden} more`;
          cell.appendChild(more);
        }
      }
      grid.appendChild(cell);
    }
  }

  document.getElementById('prevBtn').addEventListener('click', () => { nav--; render(); });
  document.getElementById('nextBtn').addEventListener('click', () => { nav++; render(); });
  document.getElementById('todayBtn').addEventListener('click', () => { nav = 0; render(); });

  render();
  fetchCards();
</script>
</body>
</html>
